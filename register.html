<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - MediCare</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>



<body class="register-body">

  <section class="login-page">

    <div class="register-container">
        <!-- left-side -->
        <div class="register-left">
  
          <img src="reen.jpg" alt="medical">
  
        </div>
      <!-- right side -->
      <div class="register-right">

        <h2>WELCOME</h2>

        <p>Please fill in your registeration details below</p>

        <form class="auth-form">
            <h2>WELCOME</h2>
            <p class="subtitle">Please fill in your registration details below</p>
        
            <div class="input-group">
                <i class="fa fa-user"></i>
                <input type="text" placeholder="Username" required>
            </div>
        
            <div class="input-group">
                <i class="fa fa-envelope"></i>
                <input type="email" placeholder="Enter Email" required>
            </div>
        
            <div class="input-group">
                <i class="fa fa-phone"></i>
                <input type="text" placeholder="Phone number" required>
            </div>
        
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
        
            <button type="submit">Register</button>
        
            <p class="login-link">Already have an account? <a href="login.html">login here</a></p>
        </form>
        <div class="divider">

          <span></span>

          <p>OR</p>

          <span></span>

        </div>

        <button class="google-btn">
            <img src="goog.png" alt="" srcset="">
        </button>

        <p class="signup-text">
         already have an account?
          <a href="login.html">login here</a>
        </p>

      </div>

      

    </div>

  </section>

</body>
</html>
